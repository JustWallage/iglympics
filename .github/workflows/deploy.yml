name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.12"

      - name: Terraform Init
        working-directory: iac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        run: |
          terraform init \
            -backend-config="endpoints={s3=\"https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com\"}"

      - name: Check
        run: pnpm check

      - name: Terraform Apply
        working-directory: iac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: terraform apply -auto-approve

      - name: Read Terraform Outputs
        working-directory: iac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        run: |
          echo "STAGING_DB_ID=$(terraform output -raw d1_database_id_staging)" >> "$GITHUB_ENV"
          echo "PROD_DB_ID=$(terraform output -raw d1_database_id_prod)" >> "$GITHUB_ENV"

      - name: Generate wrangler.toml
        run: |
          sed \
            -e "s/STAGING_DB_ID/$STAGING_DB_ID/g" \
            -e "s/PROD_DB_ID/$PROD_DB_ID/g" \
            wrangler.toml.template > wrangler.toml

      - name: Set Secrets
        run: |
          # Shared secrets for both environments
          for name in JWT_SECRET ADMIN_NAME; do
            for env in preview production; do
              printf '%s' "${!name}" | pnpm exec wrangler pages secret put "$name" --project-name iglympics --env "$env"
            done
          done
          # USERS_JSON: test version for preview, real for production
          printf '%s' "$USERS_JSON_TEST" | pnpm exec wrangler pages secret put USERS_JSON --project-name iglympics --env preview
          printf '%s' "$USERS_JSON" | pnpm exec wrangler pages secret put USERS_JSON --project-name iglympics --env production
          # ALLOW_TEST_RESET only for preview (staging), not production
          printf 'true' | pnpm exec wrangler pages secret put ALLOW_TEST_RESET --project-name iglympics --env preview
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_NAME: ${{ secrets.ADMIN_NAME }}
          USERS_JSON: ${{ secrets.USERS_JSON }}
          USERS_JSON_TEST: ${{ secrets.USERS_JSON_TEST }}

      - name: Build
        run: pnpm build

      - name: Deploy DO Worker
        run: pnpm exec wrangler deploy -c wrangler.do.toml

      - name: Run Staging DB Migrations
        run: pnpm exec wrangler d1 migrations apply DB --remote --env preview

      - name: Deploy to Staging
        id: staging-deploy
        run: |
          OUTPUT=$(pnpm exec wrangler pages deploy dist --project-name iglympics --branch staging --commit-dirty=true 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -o 'https://[^ ]*\.pages\.dev' | tail -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Seed Staging DB
        run: |
          curl -sf -X POST "${{ steps.staging-deploy.outputs.url }}/api/seed"

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests against Staging
        run: pnpm exec playwright test
        env:
          E2E_BASE_URL: ${{ steps.staging-deploy.outputs.url }}

      - name: Upload Playwright Report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Run Production DB Migrations
        run: pnpm exec wrangler d1 migrations apply DB --remote --env production

      - name: Deploy to Production
        run: pnpm exec wrangler pages deploy dist --project-name iglympics --branch main --commit-dirty=true
    
      - name: Seed prod DB
        run: |
          PROD_URL=iglympics.just.wallage.nl
          curl -sf -X POST "${PROD_URL}/api/seed"
